name: fastlane

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  classify-risk:
    name: fastlane / classify-risk
    runs-on: ubuntu-latest
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base for PR comparison
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "${BASE_REF}" --depth=250

      - name: Classify risk
        id: classify
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FASTLANE_BASE_REF: ${{ github.base_ref }}
          FASTLANE_PUSH_BEFORE: ${{ github.event.before }}
          FASTLANE_PUSH_AFTER: ${{ github.event.after }}
        run: python3 .github/scripts/classify_risk.py

  quick-checks:
    name: fastlane / quick-checks
    runs-on: ubuntu-latest
    needs: [classify-risk]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Flutter
        if: hashFiles('pubspec.yaml') != ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Quick checks
        run: python3 .github/scripts/fastlane_config.py quick

  deep-checks:
    name: fastlane / deep-checks
    runs-on: ubuntu-latest
    needs: [classify-risk]
    if: needs.classify-risk.outputs.risk == 'high'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Setup Flutter
        if: hashFiles('pubspec.yaml') != ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Deep checks (high-risk only)
        run: python3 .github/scripts/fastlane_config.py deep